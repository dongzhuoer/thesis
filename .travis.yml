dist: xenial
language: minimal
git:
  depth: false
  submodules: false
cache: 
  directories: [$TRAVIS_BUILD_DIR/_bookdown_files/, $HOME/.local/lib/R/]

# I export env in `script` to enable stages, since I might want to add other jobs
script: 
  - export input_git=$TRAVIS_BUILD_DIR
  - export repo_git="-b zhuoer-thesis https://$GITHUB_PAT@github.com/dongzhuoer/bookdown.dongzhuoer.com.git"
  - export rmd_dir=""
  - export system_dep="fonts-wqy-zenhei"   
  - export install_pkg="remotes::update_packages(c('magrittr', 'tidyverse', 'cowplot'))"
  - export render_args=""
  - export zhuoerdown=false
  - wget https://raw.githubusercontent.com/dongzhuoer/zhuoerdown/master/inst/travis-script.sh && bash travis-script.sh

notifications:
  email: false
